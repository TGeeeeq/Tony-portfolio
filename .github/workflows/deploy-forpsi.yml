name: Deploy to Forpsi (FTP)

# Builds the CRA frontend and uploads it to Forpsi shared hosting over FTP.
# Runs on GitHub-hosted runners, which have unrestricted outbound network
# access (Claude Code's cloud sandbox blocks FTP ports, so deploys cannot
# run from there — this workflow is the cloud-compatible path).
#
# Required repository secrets (Settings -> Secrets and variables -> Actions):
#   FTP_SERVER    e.g. ftpx.forpsi.com
#   FTP_USERNAME  e.g. www.antoninfigueroa.cz
#   FTP_PASSWORD  the (rotated!) FTP password
# Optional repository variable:
#   FTP_SERVER_DIR  remote web root, defaults to /www/

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: frontend
        run: yarn install --frozen-lockfile

      - name: Build
        working-directory: frontend
        env:
          CI: 'false'
          GENERATE_SOURCEMAP: 'false'
        run: yarn build

      - name: Deploy to Forpsi via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          port: 21
          local-dir: ./frontend/build/
          server-dir: ${{ vars.FTP_SERVER_DIR || '/www/' }}
