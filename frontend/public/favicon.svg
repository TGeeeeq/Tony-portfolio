  <defs>
    <style><![CDATA[
      text { font-family: 'Cormorant Garamond', 'Times New Roman', Georgia, serif; font-weight: 600; }
    ]]></style>
  </defs>

  <rect width="100" height="100" rx="22" fill="#0a0908"/>

  <circle cx="50" cy="50" r="44" fill="none" stroke="#d4a45a" stroke-opacity="0.45" stroke-width="1.2" stroke-dasharray="3 5"/>
  <circle cx="50" cy="22" r="2.2" fill="#d4a45a"/>

  <circle cx="40" cy="52" r="22" fill="none" stroke="#d4a45a" stroke-opacity="0.8" stroke-width="1.4"/>
  <circle cx="60" cy="52" r="22" fill="none" stroke="#d4a45a" stroke-opacity="0.8" stroke-width="1.4"/>

  <text x="39" y="63" font-size="34" text-anchor="middle" fill="#d4a45a" letter-spacing="-1">A</text>
  <text x="59" y="63" font-size="34" text-anchor="middle" fill="#f1e9d8" letter-spacing="-1">F</text>
