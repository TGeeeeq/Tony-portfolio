<?xml version="1.0" encoding="UTF-8"?>
<!--
  Antonín Figueroa — AF Monogram (animated)
  Pure SVG + SMIL animations. Works in all modern browsers.
  Drop this file on any webpage: <img src="af-logo.svg" width="200" />
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="240" height="240" role="img" aria-label="AF monogram">
  <defs>
    <style><![CDATA[
      .gold  { stroke: #d4a45a; fill: none; }
      .dot   { fill: #d4a45a; }
      .lA    { fill: #d4a45a; }
      .lF    { fill: #f1e9d8; }
      text { font-family: 'Cormorant Garamond', 'Times New Roman', Georgia, serif; font-weight: 500; }
    ]]></style>
  </defs>

  <!-- Transparent background (remove this rect or fill it for a bg) -->
  <rect width="100" height="100" fill="transparent"/>

  <!-- Outer dashed ring: rotates slowly -->
  <g>
    <circle cx="50" cy="50" r="46" class="gold" stroke-opacity="0.35" stroke-width="0.6" stroke-dasharray="2 4"/>
    <animateTransform attributeName="transform" type="rotate"
                      from="0 50 50" to="360 50 50" dur="24s" repeatCount="indefinite"/>
  </g>

  <!-- Middle ring with orbiting dot: rotates the other way -->
  <g>
    <circle cx="50" cy="50" r="40" class="gold" stroke-opacity="0.55" stroke-width="0.5"/>
    <circle cx="50" cy="22" r="1.6" class="dot"/>
    <animateTransform attributeName="transform" type="rotate"
                      from="360 50 50" to="0 50 50" dur="32s" repeatCount="indefinite"/>
  </g>

  <!-- Vesica piscis (two overlapping circles) — static -->
  <circle cx="40" cy="50" r="22" class="gold" stroke-opacity="0.7" stroke-width="0.7"/>
  <circle cx="60" cy="50" r="22" class="gold" stroke-opacity="0.7" stroke-width="0.7"/>

  <!-- AF monogram -->
  <!-- The A and F sit on the baseline. dominant-baseline doesn't render in some exporters,
       so we position using explicit y and rely on text-anchor. -->
  <text x="39" y="60" font-size="28" text-anchor="middle" class="lA" letter-spacing="-1">A</text>
  <text x="58" y="60" font-size="28" text-anchor="middle" class="lF" letter-spacing="-1">F</text>
</svg>
